<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop | Lolita's Boutique</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      nav {
        padding: 30px 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #eee;
      }
      .nav-links a {
        text-decoration: none;
        color: black;
        margin-left: 30px;
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      .filter-bar {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 40px 0;
      }
      .filter-btn {
        padding: 8px 25px;
        border: 1px solid #000;
        background: none;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 0.7rem;
      }
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 40px;
        padding: 0 60px;
      }
      .product-card {
        text-align: center;
        padding: 15px;
        border: 1px solid #f9f9f9;
      }
      .product-card img {
        width: 100%;
        height: 380px;
        object-fit: cover;
      }
      .add-btn {
        width: 100%;
        padding: 15px;
        background: black;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 0.75rem;
        letter-spacing: 2px;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <nav>
      <h1
        style="
          font-family: &quot;Playfair Display&quot;;
          color: #d4a373;
          margin: 0;
        "
      >
        LOLITA'S
      </h1>
      <div class="nav-links">
        <a href="index.html">Collection</a>
        <a href="shop.html">Shop</a>
        <a href="checkout.html">Bag (<span id="cart-count">0</span>)</a>
      </div>
    </nav>

    <div class="filter-bar">
      <button class="filter-btn">Dresses</button>
      <button class="filter-btn">Perfumes</button>
      <button class="filter-btn">Jewelry</button>
    </div>

    <div id="gallery-container" class="product-grid"></div>

    <script src="script.js"></script>
  </body>
</html>
