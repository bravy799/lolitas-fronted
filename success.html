<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Success | Lolita's Boutique</title>
    <style>
      body {
        font-family: "Inter", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #f4f7f9;
      }
      .card {
        background: white;
        padding: 50px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        max-width: 450px;
      }
      .check-icon {
        width: 80px;
        height: 80px;
        background: #121212;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin: 0 auto 20px;
      }
      .ref-box {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 10px;
        font-family: monospace;
        border: 1px dashed #ccc;
        margin: 20px 0;
        font-size: 14px;
      }
      .btn {
        display: inline-block;
        background: #121212;
        color: white;
        padding: 15px 35px;
        text-decoration: none;
        border-radius: 35px;
        font-weight: bold;
        transition: 0.3s;
        font-size: 14px;
      }
      .btn:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="check-icon">✓</div>
      <h1>Payment Received</h1>
      <p>
        Thank you for shopping with Lolita's. Your order is being processed.
      </p>
      <div class="ref-box" id="display-ref">Verifying reference...</div>
      <a href="orders.html" class="btn">View My Orders</a>
    </div>

    <script>
      window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        const ref = params.get("ref"); // Captures reference from Paystack

        // 1. Get the items currently in the cart
        const cart = JSON.parse(localStorage.getItem("lolitasCart")) || [];

        if (ref && cart.length > 0) {
          // 2. Load existing order history
          let history =
            JSON.parse(localStorage.getItem("lolitasOrderHistory")) || [];

          // 3. Create the new order object using the structure your Orders page expects
          const newOrder = {
            ref: ref,
            date: new Date().toLocaleString(),
            total:
              cart.reduce(
                (sum, item) => sum + item.price * (item.quantity || 1),
                0,
              ) + 500,
            items: cart,
          };

          // 4. Save to permanent history
          history.push(newOrder);
          localStorage.setItem("lolitasOrderHistory", JSON.stringify(history));

          // 5. Clear the shopping cart so it's empty for the next visit
          localStorage.removeItem("lolitasCart");

          document.getElementById("display-ref").innerText =
            "Reference: " + ref;
        } else if (!ref) {
          // Safety: If someone lands here without paying, send them home
          window.location.href = "index.html";
        }
      };
    </script>
  </body>
</html>
