<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lolita's | Admin Portal</title>
    <style>
        :root { --gold: #d4a373; --dark: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; }
        
        /* Login Overlay */
        #auth-screen { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: var(--card); padding: 40px; border-radius: 8px; border: 1px solid var(--gold); text-align: center; width: 300px; }
        
        /* Dashboard Layout */
        #admin-dash { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid #333; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--gold); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .delete-btn { background: #ff4d4d; margin-top: 10px; }
        
        .product-item { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 1px solid #333; }
        .product-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-card">
            <h2 style="color: var(--gold)">Management Login</h2>
            <input type="password" id="pass-field" placeholder="Secret Key">
            <button onclick="login()">Enter Dashboard</button>
        </div>
    </div>

    <div id="admin-dash">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Lolita's Inventory</h1>
            <button onclick="location.reload()" style="width: auto; padding: 8px 15px;">Logout</button>
        </header>

        <div class="grid">
            <div class="card">
                <h3>Add New Product</h3>
                <input type="text" id="name" placeholder="Name">
                <input type="number" id="price" placeholder="Price (NGN)">
                <input type="text" id="img" placeholder="Image URL">
                <select id="cat">
                    <option value="Dresses">Dresses</option>
                    <option value="Jewelry">Jewelry</option>
                    <option value="Perfumes">Perfumes</option>
                </select>
                <button onclick="saveProduct()">Upload to Shop</button>
            </div>

            <div class="card">
                <h3>Live Stock</h3>
                <div id="stock-list">Loading products...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://lolitas-api.onrender.com";
        const SECRET = "lolita2026"; // CHANGE THIS TO YOUR PASSWORD

        function login() {
            if(document.getElementById('pass-field').value === SECRET) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('admin-dash').style.display = 'block';
                loadStock();
            } else { alert("Wrong Key!"); }
        }

        async function loadStock() {
            const res = await fetch(`${API_BASE}/products`);
            const products = await res.json();
            const list = document.getElementById('stock-list');
            list.innerHTML = products.map(p => `
                <div class="product-item">
                    <img src="${p.image}">
                    <div style="flex:1"><b>${p.name}</b><br>₦${p.price}</div>
                    <button class="delete-btn" onclick="deleteProduct(${p.id})">Remove</button>
                </div>
            `).join('');
        }

        async function saveProduct() {
            const product = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                image: document.getElementById('img').value,
                category: document.getElementById('cat').value
            };
            await fetch(`${API_BASE}/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            });
            loadStock();
        }

        async function deleteProduct(id) {
            if(confirm("Delete this item?")) {
                await fetch(`${API_BASE}/products/${id}`, { method: 'DELETE' });
                loadStock();
            }
        }
    </script>
</body>
</html>
