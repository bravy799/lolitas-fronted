<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Lolita's Boutique</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #fff;
        margin: 0;
      }
      nav {
        padding: 30px 60px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      nav h1 {
        font-family: "Playfair Display";
        margin: 0;
        color: #d4a373;
      }
      .nav-links a {
        text-decoration: none;
        color: black;
        margin-left: 30px;
        font-size: 0.8rem;
        text-transform: uppercase;
      }

      .checkout-wrapper {
        max-width: 1100px;
        margin: 60px auto;
        padding: 0 40px;
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 80px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 0.8rem;
        margin-bottom: 8px;
        font-weight: 600;
        text-transform: uppercase;
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        box-sizing: border-box;
      }

      .order-summary {
        background: #fdfaf7;
        padding: 30px;
        border-radius: 2px;
      }
      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        font-size: 0.9rem;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
      }
      .remove-btn {
        background: none;
        border: none;
        color: #cc0000;
        cursor: pointer;
        font-size: 0.7rem;
        text-transform: uppercase;
        font-weight: 600;
      }

      .total-row {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
        border-top: 1px solid #ddd;
        padding-top: 20px;
        font-size: 1.5rem;
        font-family: "Playfair Display";
      }
      .btn-finish {
        width: 100%;
        padding: 18px;
        background: black;
        color: white;
        border: none;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 20px;
      }
      .care-box {
        margin-top: 30px;
        font-size: 0.85rem;
        color: #666;
        border-top: 1px solid #ddd;
        padding-top: 20px;
      }
    </style>
  </head>
  <body>
    <nav>
      <h1>LOLITA'S</h1>
      <div class="nav-links">
        <a href="index.html">Collection</a>
        <a href="shop.html">Shop</a>
      </div>
    </nav>
    <div class="checkout-wrapper">
      <div class="delivery-details">
        <h2 style="font-family: &quot;Playfair Display&quot;">
          Delivery Details
        </h2>
        <form id="checkout-form">
          <div class="form-group">
            <label>Full Name</label
            ><input
              type="text"
              id="full-name"
              placeholder="Enter your name"
              required
            />
          </div>
          <div class="form-group">
            <label>Email Address</label
            ><input
              type="email"
              id="email-address"
              placeholder="email@example.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Phone Number</label
            ><input
              type="tel"
              id="phone-number"
              placeholder="+234..."
              required
            />
          </div>
          <div class="form-group">
            <label>Shipping Address</label
            ><input
              type="text"
              id="shipping-address"
              placeholder="Street, City, State"
              required
            />
          </div>
          <button type="submit" class="btn-finish">Finish & Pay</button>
        </form>
      </div>
      <div class="order-summary">
        <h3 style="font-family: &quot;Playfair Display&quot;">Your Bag</h3>
        <div id="summary-items"></div>
        <div class="total-row">
          <span>Total</span><span id="total-amount">$0.00</span>
        </div>
        <div class="care-box">
          <h4 style="margin-bottom: 5px; color: black">Customer Care</h4>
          <p>
            Need help? Email care@lolitas.com or WhatsApp us at +234 800 LOLITA.
          </p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
